name: CI — Auto Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 📝 Create env file for CI
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env.local
          else
            echo "JWT_SECRET=sop-knowledge-base-super-secret-key-2026" > .env.local
          fi

      - name: 🧹 Run ESLint
        run: npm run lint

      - name: 🏗️ Build project
        run: npm run build
